<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    
    <title>NeoBrick 3D</title>

    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="icon.svg">
    <link rel="manifest" href="manifest.json">

    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="NeoBrick 3D">
    <meta name="mobile-web-app-capable" content="yes">

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root {
            --safe-top: env(safe-area-inset-top, 24px);
            --safe-bottom: env(safe-area-inset-bottom, 24px);
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #020617;
            background-image: radial-gradient(circle at 50% 30%, #0b1329 0%, #020617 80%);
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
            height: 100dvh;
            transition: background-color 0.15s ease;
        }
        .safe-top-padding { padding-top: calc(var(--safe-top) + 4px); }
        .safe-bottom-padding { padding-bottom: calc(var(--safe-bottom) + 32px); }
        
        .glass-panel {
            background: rgba(15, 23, 42, 0.55);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(34, 211, 238, 0.3);
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.12), inset 0 0 12px rgba(34, 211, 238, 0.05);
        }
        .neon-border-magenta {
            border: 2px solid rgba(217, 70, 239, 0.5);
            box-shadow: 0 0 25px rgba(217, 70, 239, 0.3), inset 0 0 10px rgba(217, 70, 239, 0.15);
        }
        .btn-active:active {
            transform: scale(0.92);
            background: rgba(34, 211, 238, 0.25) !important;
            box-shadow: 0 0 25px rgba(34, 211, 238, 0.6) !important;
        }
        .btn-rotate-active:active {
            transform: scale(0.92);
            background: rgba(217, 70, 239, 0.35) !important;
            box-shadow: 0 0 30px rgba(217, 70, 239, 0.7) !important;
        }

        .level-up-flash {
            animation: neonFlash 0.6s ease-out forwards;
        }
        @keyframes neonFlash {
            0% { background-color: rgba(34, 211, 238, 0.4); filter: brightness(1.5); }
            50% { background-color: rgba(217, 70, 239, 0.3); }
            100% { background-color: transparent; }
        }

        @keyframes neonFloat {
            0% { transform: translateY(20px) scale(0.7); opacity: 0; }
            20% { transform: translateY(0) scale(1.1); opacity: 1; }
            35% { transform: translateY(-5px) scale(1); opacity: 1; }
            80% { transform: translateY(-10px) scale(1); opacity: 1; filter: blur(0px); }
            100% { transform: translateY(-30px) scale(0.8); opacity: 0; filter: blur(4px); }
        }
        .level-up-text {
            animation: neonFloat 1.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
    </style>
</head>
<body class="w-screen overflow-hidden flex flex-col justify-between text-slate-100 selection:bg-transparent">

    <header class="w-full px-6 safe-top-padding flex justify-between items-center z-10 flex-shrink-0">
        <div class="glass-panel px-4 py-1.5 rounded-xl flex flex-col">
            <span class="text-[10px] text-cyan-400 font-bold tracking-wider">SCORE</span>
            <span id="score-val" class="text-xl font-black text-white">0</span>
        </div>
        <div class="text-center">
            <h1 class="text-lg font-black tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-indigo-200 to-fuchsia-500 filter drop-shadow-[0_0_10px_rgba(34,211,238,0.3)]">NEOBRICK 3D</h1>
            <div id="lives-container" class="text-rose-500 font-bold text-xs mt-0.5 tracking-wider">VIDAS: ❤️ ❤️ ❤️</div>
        </div>
        <div class="glass-panel px-4 py-1.5 rounded-xl flex flex-col items-end">
            <span class="text-[10px] text-fuchsia-400 font-semibold tracking-wider">RECORD</span>
            <span id="record-val" class="text-xl font-black text-white">0</span>
        </div>
    </header>

    <main class="flex-grow w-full max-w-md mx-auto px-4 py-2 flex relative items-center justify-center gap-4 overflow-hidden">
        <div id="canvas-container" class="w-2/3 h-full rounded-2xl overflow-hidden glass-panel relative flex items-center justify-center">
            
            <div id="level-up-alert" class="absolute pointer-events-none z-30 hidden flex-col items-center justify-center text-center">
                <span class="level-up-text font-black text-xl tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-fuchsia-400 drop-shadow-[0_0_15px_rgba(217,70,239,0.8)]">LEVEL UP!</span>
            </div>

            <div id="game-over-screen" class="absolute inset-0 bg-slate-950/90 backdrop-blur-md flex flex-col justify-center items-center z-20 p-4 transition-all text-center">
                <h2 id="end-screen-title" class="text-2xl font-black text-rose-500 tracking-wider mb-1">MENU INICIAL</h2>
                <p class="text-[10px] text-slate-400 mb-4">Estatísticas acumuladas da sua sessão atual.</p>
                
                <div class="glass-panel w-full max-w-[200px] p-3 rounded-xl mb-6 flex flex-col gap-1.5 text-left border-rose-500/30">
                    <div class="flex justify-between text-xs"><span class="text-slate-400 font-medium">Pontos:</span><span id="summary-score" class="font-bold text-white">0</span></div>
                    <div class="flex justify-between text-xs"><span class="text-slate-400 font-medium">Linhas:</span><span id="summary-lines" class="font-bold text-cyan-400">0</span></div>
                    <div class="flex justify-between text-xs"><span class="text-slate-400 font-medium">Velocidade:</span><span id="summary-speed" class="font-bold text-fuchsia-400">0 km/h</span></div>
                </div>

                <button onclick="closeMenuAndPlay()" class="px-6 py-2 bg-cyan-500 text-slate-950 font-bold rounded-lg shadow-lg shadow-cyan-500/30 active:scale-95 transition-all text-xs tracking-wider">START / JOGAR</button>
            </div>

            <div id="life-lost-screen" class="absolute inset-0 bg-slate-950/95 backdrop-blur-md hidden flex-col justify-center items-center z-20 p-4 text-center">
                <h2 class="text-xl font-black text-amber-400 tracking-wider mb-1">VOCÊ MORREU!</h2>
                <p class="text-[11px] text-slate-400 mb-5">Deseja gastar 1 vida para continuar jogando?</p>
                
                <div class="flex flex-col gap-3 w-full max-w-[180px]">
                    <button onclick="acceptContinue()" class="px-4 py-2 bg-emerald-500 text-slate-950 font-bold rounded-lg shadow-lg shadow-emerald-500/30 active:scale-95 transition-all text-xs tracking-wider">
                        USAR 1 VIDA
                    </button>
                    <button onclick="declineContinue()" class="px-4 py-2 bg-rose-600 text-white font-bold rounded-lg shadow-lg shadow-rose-600/30 active:scale-95 transition-all text-xs tracking-wider">
                        DESISTIR (GAME OVER)
                    </button>
                </div>
            </div>

        </div>

        <div class="w-1/3 h-full flex flex-col gap-3 justify-start pt-2">
            <div class="w-full aspect-square glass-panel rounded-xl overflow-hidden flex flex-col p-2 relative flex-shrink-0">
                <span class="text-[10px] text-cyan-400 font-bold tracking-widest block mb-1 text-center">NEXT</span>
                <div id="preview-container" class="w-full flex-grow"></div>
            </div>
            
            <div class="w-full glass-panel rounded-xl p-2 flex flex-col text-center flex-shrink-0">
                <span class="text-[10px] text-fuchsia-400 font-bold tracking-widest block">LEVEL</span>
                <span id="level-val" class="text-lg font-black text-white">1</span>
            </div>

            <div class="w-full glass-panel rounded-xl p-2 flex flex-col text-center flex-shrink-0">
                <span class="text-[10px] text-cyan-400 font-bold tracking-widest block">LINHAS</span>
                <span id="lines-val" class="text-lg font-black text-white">0</span>
            </div>
        </div>
    </main>

    <footer class="w-full max-w-md mx-auto px-6 safe-bottom-padding z-10 flex flex-col gap-3 flex-shrink-0 mb-5 pb-6">
        <div class="grid grid-cols-3 gap-3 items-center justify-items-center">
            <div class="flex flex-col gap-0.5 items-center">
                <button id="btn-left" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-cyan-400 text-lg btn-active border-cyan-500/40">
                    &#9664;
                </button>
                <span class="text-[8px] text-slate-500 font-bold tracking-wider">ESQ</span>
            </div>

            <div class="flex flex-col gap-0.5 items-center">
                <button id="btn-down" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-cyan-400 text-lg btn-active border-cyan-500/40">
                    &#9660;
                </button>
                <span class="text-[8px] text-slate-500 font-bold tracking-wider">DESCER</span>
            </div>

            <div class="flex flex-col gap-0.5 items-center">
                <button id="btn-right" class="w-12 h-12 rounded-full glass-panel flex items-center justify-center text-cyan-400 text-lg btn-active border-cyan-500/40">
                    &#9654;
                </button>
                <span class="text-[8px] text-slate-500 font-bold tracking-wider">DIR</span>
            </div>
        </div>

        <div class="grid grid-cols-3 gap-2 items-center w-full">
            <div class="flex justify-center">
                <button id="btn-drop" class="px-3 py-1.5 rounded-xl glass-panel text-[10px] font-bold text-cyan-400 btn-active border-cyan-500/30">
                    DROP
                </button>
            </div>
            <div class="flex flex-col items-center justify-center">
                <button id="btn-rotate" class="w-16 h-16 rounded-full bg-slate-900 neon-border-magenta flex items-center justify-center text-fuchsia-400 text-xl btn-rotate-active">
                    &#8635;
                </button>
                <span class="text-[8px] text-fuchsia-400 font-black tracking-widest mt-0.5">ROTATE</span>
            </div>
            <div class="flex justify-center">
                <button id="btn-fullscreen" class="px-2.5 py-1.5 rounded-xl bg-slate-900/90 border border-slate-700 text-[8px] font-bold text-slate-300 btn-active tracking-tight text-center leading-none">
                    TELA<br><span class="text-[7px] text-cyan-400">CHEIA</span>
                </button>
            </div>
        </div>
        
        <div class="w-full flex justify-center gap-8 items-center border-t border-slate-800/60 pt-2">
            <button id="btn-pause" class="px-4 py-1 rounded-lg bg-emerald-950/40 border border-emerald-500/40 text-[10px] font-bold text-emerald-400 btn-active">START</button>
            <button id="btn-reset" class="px-4 py-1 rounded-lg bg-rose-950/30 border border-rose-900/40 text-[10px] font-semibold text-rose-400 btn-active">RESET</button>
        </div>
    </footer>

    <script>
        const COLS = 10;
        const ROWS = 20;
        let grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
        
        let score = 0;
        let record = localStorage.getItem('neobrick_3d_record') ? parseInt(localStorage.getItem('neobrick_3d_record')) : 0;
        let level = 1;
        let linesClearedTotal = 0;
        let lives = 3; 
        let gameOver = false;
        let isAnimatingClear = false;
        
        let isPaused = true;
        let hasStarted = false;
        
        let dropCounter = 0;
        let dropInterval = 1000; 
        let lastTime = 0;

        let audioCtx = null;
        let musicInterval = null;
        let currentNoteIndex = 0;

        const melody = [
            440, 330, 349, 392, 349, 330, 294, 294, 349, 440, 392, 349, 330, 261, 294, 330,
            349, 440, 392, 349, 330, 330, 349, 392, 440, 349, 294, 294
        ];

        const STYLE_REGISTRY = {
            1: { color: 0x00f0ff, title: 'Cyan Neon Elétrico' },
            2: { color: 0xffe600, title: 'Yellow Neon Intenso' },
            3: { color: 0xcc00ff, title: 'Purple Neon Vivo' },
            4: { color: 0x00ff66, title: 'Green Neon Radioativo' },
            5: { color: 0xff0055, title: 'Red Neon Laser' },
            6: { color: 0x38bdf8, title: 'Sky Blue Brilhante' },
            7: { color: 0xff7700, title: 'Orange Neon Fogo' },
            8: { color: 0xf1f5f9, title: 'Chrome Perlado Super White' }, 
            9: { color: 0x55ff00, title: 'Uranium Glow Forte' },  
            10: { color: 0x06b6d4, title: 'Cyan Glass Premium' },   
            11: { color: 0xfbcfe8, title: 'Pink Algodão Doce' },
            12: { color: 0xff00ff, title: 'Magenta Neon Total' },
            13: { color: 0xff2a85, title: 'Hot Pink Flamingo' },
            14: { color: 0x22d3ee, title: 'Ice Aqua Cristal' },
            15: { color: 0xffffff, title: 'Diamante Puro' }
        };

        const TOTAL_STYLES = 15;

        const geometryCache = new THREE.BoxGeometry(0.95, 0.95, 0.95);
        const materialCache = {};

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playSound(type) {
            initAudio();
            if (!audioCtx || audioCtx.state === 'suspended') return;
            try {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                let now = audioCtx.currentTime;

                if (type === 'move') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.exponentialRampToValueAtTime(100, now + 0.05);
                    gainNode.gain.setValueAtTime(0.12, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.05);
                    osc.start(now);
                    osc.stop(now + 0.05);
                } else if (type === 'rotate') {
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(280, now);
                    osc.frequency.exponentialRampToValueAtTime(400, now + 0.08);
                    gainNode.gain.setValueAtTime(0.08, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.08);
                    osc.start(now);
                    osc.stop(now + 0.08);
                } else if (type === 'clear') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now);
                    osc.frequency.setValueAtTime(659.25, now + 0.08);
                    osc.frequency.setValueAtTime(783.99, now + 0.16);
                    gainNode.gain.setValueAtTime(0.20, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'life_lost') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(320, now);
                    osc.frequency.linearRampToValueAtTime(130, now + 0.4);
                    gainNode.gain.setValueAtTime(0.22, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.4);
                    osc.start(now);
                    osc.stop(now + 0.4);
                } else if (type === 'gameover') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(180, now);
                    osc.frequency.linearRampToValueAtTime(60, now + 0.6);
                    gainNode.gain.setValueAtTime(0.25, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.6);
                    osc.start(now);
                    osc.stop(now + 0.6);
                } else if (type === 'levelup') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(440, now);
                    osc.frequency.exponentialRampToValueAtTime(880, now + 0.15);
                    osc.frequency.exponentialRampToValueAtTime(1320, now + 0.4);
                    gainNode.gain.setValueAtTime(0.25, now);
                    gainNode.gain.linearRampToValueAtTime(0.01, now + 0.45);
                    osc.start(now);
                    osc.stop(now + 0.45);
                }

                setTimeout(() => {
                    osc.disconnect();
                    gainNode.disconnect();
                }, 700);

            } catch (e) { console.error(e); }
        }

        function playMusicStep() {
            if (isPaused || gameOver || isAnimatingClear || !audioCtx || audioCtx.state === 'suspended') return;
            try {
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                osc.type = 'triangle';
                osc.frequency.setValueAtTime(melody[currentNoteIndex], audioCtx.currentTime);
                
                gainNode.gain.setValueAtTime(0.03, audioCtx.currentTime);
                gainNode.gain.linearRampToValueAtTime(0.005, audioCtx.currentTime + 0.22);

                osc.start();
                osc.stop(audioCtx.currentTime + 0.25);

                setTimeout(() => {
                    osc.disconnect();
                    gainNode.disconnect();
                }, 300);

                currentNoteIndex = (currentNoteIndex + 1) % melody.length;
            } catch(e){}
        }

        function startMusicLoop() {
            stopMusicLoop();
            if (!gameOver && !isPaused) {
                const tempo = Math.max(100, 250 - (level * 10));
                musicInterval = setInterval(playMusicStep, tempo);
            }
        }

        function stopMusicLoop() {
            if (musicInterval) {
                clearInterval(musicInterval);
                musicInterval = null;
            }
        }

        document.getElementById('record-val').innerText = record;

        const TRADITIONAL_KEYS = ['I', 'O', 'T', 'S', 'Z', 'J', 'L'];
        const SPECIAL_KEYS = ['U', 'P', 'F', 'X'];

        const SHAPES = {
            'I': [[1,1,1,1]], 
            'O': [[1,1],[1,1]], 
            'T': [[0,1,0],[1,1,1]], 
            'S': [[0,1,1],[1,1,0]], 
            'Z': [[1,1,0],[0,1,1]], 
            'J': [[1,0,0],[1,1,1]], 
            'L': [[0,0,1],[1,1,1]],
            'U': [[1,0,1],[1,1,1]], 
            'P': [[1,1],[1,1],[1,0]], 
            'F': [[1,1,1],[1,0,0],[1,0,0]], 
            'X': [[0,1,0],[1,1,1],[0,1,0]]  
        };
        const SHAPE_KEYS = Object.keys(SHAPES);
        let bag = [];

        // Verifica se existe alguma posição livre no tabuleiro onde a peça se encaixe PERFEITAMENTE sem deixar vagas na linha
        function canPieceFitAnywhere(matrix) {
            let currentMatrix = matrix;
            for (let rot = 0; rot < 4; rot++) {
                const rLen = currentMatrix.length;
                const cLen = currentMatrix[0].length;
                
                for (let y = 0; y <= ROWS - rLen; y++) {
                    for (let x = 0; x <= COLS - cLen; x++) {
                        let collision = false;
                        let completesPerfectLine = false;
                        
                        for (let r = 0; r < rLen; r++) {
                            for (let c = 0; c < cLen; c++) {
                                if (currentMatrix[r][c]) {
                                    if (grid[y + r][x + c] !== 0) {
                                        collision = true;
                                        break;
                                    }
                                }
                            }
                            if (collision) break;
                        }
                        
                        if (!collision) {
                            for (let r = 0; r < rLen; r++) {
                                for (let c = 0; c < cLen; r++) { // Proteção de laço mantida conforme fluxo
                                    if (currentMatrix[r][c]) {
                                        let targetY = y + r;
                                        let filledCellsInRow = 0;
                                        for (let col = 0; col < COLS; col++) {
                                            if (grid[targetY][col] !== 0 || (col >= x && col < x + cLen && currentMatrix[targetY - y][col - x])) {
                                                filledCellsInRow++;
                                            }
                                        }
                                        if (filledCellsInRow === COLS) {
                                            completesPerfectLine = true;
                                        }
                                    }
                                    break; // Trata de forma linear cada linha afetada pela estrutura
                                }
                            }
                            if (completesPerfectLine) return true;
                        }
                    }
                }
                
                const nRows = currentMatrix.length;
                const nCols = currentMatrix[0].length;
                let nextRot = Array.from({ length: nCols }, () => Array(nRows).fill(0));
                for (let r = 0; r < nRows; r++) {
                    for (let c = 0; c < nCols; c++) {
                        nextRot[c][nRows - 1 - r] = currentMatrix[r][c];
                    }
                }
                currentMatrix = nextRot;
            }
            return false;
        }

        function generatePiece() {
            if (bag.length === 0) {
                let batch1 = [...SHAPE_KEYS].sort(() => Math.random() - 0.5);
                let batch2 = [...SHAPE_KEYS].sort(() => Math.random() - 0.5);
                bag = batch1.concat(batch2);
            }
            
            let key = bag.pop();
            
            if (SPECIAL_KEYS.includes(key)) {
                if (!canPieceFitAnywhere(SHAPES[key])) {
                    key = TRADITIONAL_KEYS[Math.floor(Math.random() * TRADITIONAL_KEYS.length)];
                }
            }

            const baseMatrix = SHAPES[key];
            const isPartyMode = Math.random() < 0.45;
            const defaultStyleId = Math.floor(Math.random() * TOTAL_STYLES) + 1;

            let finalMatrix = [];
            for (let r = 0; r < baseMatrix.length; r++) {
                finalMatrix[r] = [];
                for (let c = 0; c < baseMatrix[r].length; c++) {
                    if (baseMatrix[r][c] === 1) {
                        finalMatrix[r][c] = isPartyMode ? (Math.floor(Math.random() * TOTAL_STYLES) + 1) : defaultStyleId;
                    } else {
                        finalMatrix[r][c] = 0;
                    }
                }
            }

            return {
                matrix: finalMatrix,
                x: Math.floor((COLS - baseMatrix[0].length) / 2),
                y: 0
            };
        }

        let currentPiece = generatePiece();
        let nextPiece = generatePiece();

        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        
        const camera = new THREE.OrthographicCamera(-5, 5, 10, -10, 1, 1000);
        camera.position.set(COLS / 2, -ROWS / 2, 25);
        camera.lookAt(COLS / 2, -ROWS / 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        container.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.35));
        
        const frontLight = new THREE.DirectionalLight(0xffffff, 1.5);
        frontLight.position.set(3, 5, 25);
        scene.add(frontLight);

        const leftLight = new THREE.DirectionalLight(0xffffff, 0.9);
        leftLight.position.set(-8, 2, 15);
        scene.add(leftLight);

        const intenseTop = new THREE.DirectionalLight(0xffffff, 1.2);
        intenseTop.position.set(5, 12, 10);
        scene.add(intenseTop);

        const pContainer = document.getElementById('preview-container');
        const pScene = new THREE.Scene();
        const pCamera = new THREE.OrthographicCamera(-2.2, 2.2, 2.2, -2.2, 1, 100);
        pCamera.position.set(0, 0, 10);
        pCamera.lookAt(0, 0, 0);
        
        const pRenderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        pRenderer.setSize(pContainer.clientWidth, pContainer.clientHeight);
        pContainer.appendChild(pRenderer.domElement);
        
        pScene.add(new THREE.AmbientLight(0xffffff, 0.4));
        const pLight = new THREE.DirectionalLight(0xffffff, 1.4);
        pLight.position.set(2, 5, 15);
        pScene.add(pLight);

        let blockMeshes = [];

        function getCachedMaterial(styleId) {
            if (materialCache[styleId]) return materialCache[styleId];

            if (styleId === -1) {
                const mat = new THREE.MeshPhysicalMaterial({
                    color: 0xffffff,
                    emissive: 0xffffff,
                    emissiveIntensity: 5.0,
                    transmission: 0.1,
                    roughness: 0.0
                });
                materialCache[styleId] = mat;
                return mat;
            }

            const config = STYLE_REGISTRY[styleId] || STYLE_REGISTRY[1];
            
            let matProps = {
                color: config.color,
                roughness: 0.05,
                metalness: 0.1,
                clearcoat: 1.0,
                clearcoatRoughness: 0.0,
                transmission: 0.4,
                thickness: 0.6,
                ior: 1.60,
                emissive: config.color,
                emissiveIntensity: 1.6, 
                transparent: false
            };

            if (styleId === 8) { 
                matProps.roughness = 0.0;
                matProps.metalness = 0.8;
                matProps.transmission = 0.0;
                matProps.emissiveIntensity = 1.2;
            } else if (styleId === 9) { 
                matProps.emissiveIntensity = 3.2;
                matProps.transmission = 0.2;
            } else if (styleId === 10) { 
                matProps.transmission = 0.1;
                matProps.thickness = 0.8;
                matProps.roughness = 0.05;
                matProps.emissiveIntensity = 2.6; 
                matProps.emissive = 0x06b6d4; 
            } else if (styleId === 11) { 
                matProps.roughness = 0.1;
                matProps.metalness = 0.3;
                matProps.transmission = 0.0;
                matProps.emissiveIntensity = 1.5;
            } else if (styleId === 12 || styleId === 13 || styleId === 14) {
                matProps.emissiveIntensity = 2.5;
            } else if (styleId === 15) {
                matProps.roughness = 0.02;
                matProps.metalness = 0.2;
                matProps.clearcoat = 1.0;
                matProps.emissiveIntensity = 2.0;
            }

            const mat = new THREE.MeshPhysicalMaterial(matProps);
            materialCache[styleId] = mat;
            return mat;
        }

        function createCubeMesh(styleId) {
            return new THREE.Mesh(geometryCache, getCachedMaterial(styleId));
        }

        function drawScene() {
            blockMeshes.forEach(mesh => scene.remove(mesh));
            blockMeshes = [];

            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (grid[r][c]) {
                        const mesh = createCubeMesh(grid[r][c]);
                        mesh.position.set(c + 0.5, -r - 0.5, 0);
                        scene.add(mesh);
                        blockMeshes.push(mesh);
                    }
                }
            }

            if (!gameOver && !isAnimatingClear) {
                currentPiece.matrix.forEach((row, r) => {
                    row.forEach((value, c) => {
                        if (value) {
                            const mesh = createCubeMesh(value);
                            mesh.position.set(currentPiece.x + c + 0.5, -(currentPiece.y + r) - 0.5, 0);
                            scene.add(mesh);
                            blockMeshes.push(mesh);
                        }
                    });
                });
            }
            renderer.render(scene, camera);
        }

        let previewMeshes = [];
        function drawPreview() {
            previewMeshes.forEach(mesh => pScene.remove(mesh));
            previewMeshes = [];

            const matrix = nextPiece.matrix;
            const rLen = matrix.length;
            const cLen = matrix[0].length;

            matrix.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value) {
                        const mesh = createCubeMesh(value);
                        mesh.position.set(c + 0.5 - cLen / 2, -r - 0.5 + rLen / 2, 0);
                        pScene.add(mesh);
                        previewMeshes.push(mesh);
                    }
                });
            });
            pRenderer.render(pScene, pCamera);
        }

        function checkCollision(piece, offsetX, offsetY, newMatrix = piece.matrix) {
            for (let r = 0; r < newMatrix.length; r++) {
                for (let c = 0; c < newMatrix[r].length; c++) {
                    if (newMatrix[r][c]) {
                        let newX = piece.x + c + offsetX;
                        let newY = piece.y + r + offsetY;

                        if (newX < 0 || newX >= COLS || newY >= ROWS) return true;
                        if (newY >= 0 && grid[newY][newX]) return true;
                    }
                }
            }
            return false;
        }

        function mergePiece() {
            currentPiece.matrix.forEach((row, r) => {
                row.forEach((value, c) => {
                    if (value) {
                        if (currentPiece.y + r >= 0) {
                            grid[currentPiece.y + r][currentPiece.x + c] = value;
                        }
                    }
                });
            });
        }

        function rotatePiece() {
            if (gameOver || isPaused || isAnimatingClear) return;
            const nRows = currentPiece.matrix.length;
            const nCols = currentPiece.matrix[0].length;
            let rotated = Array.from({ length: nCols }, () => Array(nRows).fill(0));

            for (let r = 0; r < nRows; r++) {
                for (let c = 0; c < nCols; c++) {
                    rotated[c][nRows - 1 - r] = currentPiece.matrix[r][c];
                }
            }

            if (!checkCollision(currentPiece, 0, 0, rotated)) {
                currentPiece.matrix = rotated;
                playSound('rotate');
            } else if (!checkCollision(currentPiece, -1, 0, rotated)) {
                currentPiece.x -= 1;
                currentPiece.matrix = rotated;
                playSound('rotate');
            } else if (!checkCollision(currentPiece, 1, 0, rotated)) {
                currentPiece.x += 1;
                currentPiece.matrix = rotated;
                playSound('rotate');
            } else if (!checkCollision(currentPiece, -2, 0, rotated)) {
                currentPiece.x -= 2;
                currentPiece.matrix = rotated;
                playSound('rotate');
            } else if (!checkCollision(currentPiece, 2, 0, rotated)) {
                currentPiece.x += 2;
                currentPiece.matrix = rotated;
                playSound('rotate');
            }
            drawScene();
        }

        function movePiece(dir) {
            if (gameOver || isPaused || isAnimatingClear) return;
            if (!checkCollision(currentPiece, dir, 0)) {
                currentPiece.x += dir;
                playSound('move');
                drawScene();
            }
        }

        function dropPiece() {
            if (gameOver || isPaused || isAnimatingClear) return;
            if (!checkCollision(currentPiece, 0, 1)) {
                currentPiece.y += 1;
            } else {
                if (currentPiece.y <= 0) {
                    handleLifeLoss();
                    return;
                }
                mergePiece();
                checkAndClearLines();
            }
            drawScene();
        }

        function hardDropPiece() {
            if (gameOver || isPaused || isAnimatingClear) return;
            while (!checkCollision(currentPiece, 0, 1)) {
                currentPiece.y += 1;
            }
            playSound('move');
            mergePiece();
            checkAndClearLines();
            drawScene();
        }

        function triggerNeonLevelUpEffects() {
            playSound('levelup');
            
            document.body.classList.add('level-up-flash');
            setTimeout(() => {
                document.body.classList.remove('level-up-flash');
            }, 600);

            const alertEl = document.getElementById('level-up-alert');
            alertEl.style.display = 'flex';
            
            const textEl = alertEl.querySelector('.level-up-text');
            const newTextEl = textEl.cloneNode(true);
            alertEl.replaceChild(newTextEl, textEl);

            setTimeout(() => {
                alertEl.style.display = 'none';
            }, 1800);
        }

        function checkAndClearLines() {
            let fullRows = [];
            for (let r = 0; r < ROWS; r++) {
                if (grid[r].every(cell => cell !== 0)) {
                    fullRows.push(r);
                }
            }

            if (fullRows.length > 0) {
                isAnimatingClear = true;
                playSound('clear');
                
                fullRows.forEach(r => {
                    grid[r].fill(-1);
                });
                drawScene();

                setTimeout(() => {
                    grid = grid.filter((row, r) => !fullRows.includes(r));
                    while (grid.length < ROWS) {
                        grid.unshift(Array(COLS).fill(0));
                    }
                    
                    const pointsTable = [0, 100, 300, 500, 800];
                    score += pointsTable[fullRows.length] * level;
                    linesClearedTotal += fullRows.length;

                    let newLevel = Math.floor(linesClearedTotal / 10) + 1;
                    if (newLevel > level) {
                        level = newLevel;
                        dropInterval = Math.max(100, 1000 - (level - 1) * 75);
                        triggerNeonLevelUpEffects();
                    }

                    document.getElementById('score-val').innerText = score;
                    document.getElementById('level-val').innerText = level;
                    document.getElementById('lines-val').innerText = linesClearedTotal;

                    if (score > record) {
                        record = score;
                        localStorage.setItem('neobrick_3d_record', record);
                        document.getElementById('record-val').innerText = record;
                    }

                    currentPiece = nextPiece;
                    nextPiece = generatePiece();
                    drawPreview();
                    
                    dropCounter = 0;
                    isAnimatingClear = false;
                    
                    if (!isPaused) {
                        startMusicLoop();
                    }
                    drawScene();

                    if (checkCollision(currentPiece, 0, 0)) {
                        handleLifeLoss();
                    }
                }, 220); 
            } else {
                currentPiece = nextPiece;
                nextPiece = generatePiece();
                drawPreview();
                if (checkCollision(currentPiece, 0, 0)) {
                    handleLifeLoss();
                }
            }
        }

        function handleLifeLoss() {
            isPaused = true;
            stopMusicLoop();
            document.getElementById('life-lost-screen').style.display = 'flex';
        }

        function acceptContinue() {
            initAudio();
            document.getElementById('life-lost-screen').style.display = 'none';
            lives--;
            updateLivesDisplay();
            
            if (lives > 0) {
                playSound('life_lost');
                grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
                currentPiece = generatePiece();
                nextPiece = generatePiece();
                drawPreview();
                
                isPaused = false;
                startMusicLoop();
                drawScene();
            } else {
                triggerGameOver("GAME OVER");
            }
        }

        function declineContinue() {
            initAudio();
            document.getElementById('life-lost-screen').style.display = 'none';
            lives = 0;
            updateLivesDisplay();
            triggerGameOver("GAME OVER");
        }

        function updateLivesDisplay() {
            let heartString = "VIDAS: ";
            for (let i = 0; i < 3; i++) {
                heartString += (i < lives) ? "❤️ " : "🖤 ";
            }
            document.getElementById('lives-container').innerText = heartString;
        }

        function calculateDisplaySpeed() {
            return Math.round((1000 / dropInterval) * 15 + (level * 8));
        }

        function triggerGameOver(titleText = "MENU INICIAL") {
            gameOver = true;
            hasStarted = false;
            stopMusicLoop();
            if (titleText === "GAME OVER") {
                playSound('gameover');
            }
            
            document.getElementById('end-screen-title').innerText = titleText;
            document.getElementById('summary-score').innerText = score;
            document.getElementById('summary-lines').innerText = linesClearedTotal;
            document.getElementById('summary-speed').innerText = calculateDisplaySpeed() + " km/h";
            
            document.getElementById('game-over-screen').style.display = 'flex';
            
            const pBtn = document.getElementById('btn-pause');
            pBtn.innerText = "START";
            pBtn.className = "px-4 py-1 rounded-lg bg-emerald-950/40 border border-emerald-500/40 text-[10px] font-bold text-emerald-400 btn-active";
        }

        function closeMenuAndPlay() {
            initAudio();
            document.getElementById('game-over-screen').style.display = 'none';
            if (gameOver || lives <= 0) {
                resetGame();
            }
            handleControlFlow();
        }

        function resetGame() {
            grid = Array.from({ length: ROWS }, () => Array(COLS).fill(0));
            score = 0;
            level = 1;
            linesClearedTotal = 0;
            lives = 3;
            dropInterval = 1000;
            gameOver = false;
            isPaused = true;
            hasStarted = false;
            isAnimatingClear = false;
            stopMusicLoop();
            
            document.getElementById('score-val').innerText = '0';
            document.getElementById('level-val').innerText = '1';
            document.getElementById('lines-val').innerText = '0';
            updateLivesDisplay();
            
            const pBtn = document.getElementById('btn-pause');
            pBtn.innerText = "START";
            pBtn.className = "px-4 py-1 rounded-lg bg-emerald-950/40 border border-emerald-500/40 text-[10px] font-bold text-emerald-400 btn-active";
            
            currentPiece = generatePiece();
            nextPiece = generatePiece();
            drawScene();
            drawPreview();
        }

        function handleControlFlow() {
            initAudio();
            if (gameOver || isAnimatingClear) return;
            
            if (document.getElementById('game-over-screen').style.display === 'flex') {
                document.getElementById('game-over-screen').style.display = 'none';
            }
            if (document.getElementById('life-lost-screen').style.display === 'flex') return;

            const pBtn = document.getElementById('btn-pause');
            
            if (!hasStarted) {
                hasStarted = true;
                isPaused = false;
                pBtn.innerText = "PAUSE";
                pBtn.className = "px-4 py-1 rounded-lg bg-slate-800/80 text-[10px] font-semibold text-slate-400 btn-active";
                startMusicLoop();
            } else {
                isPaused = !isPaused;
                pBtn.innerText = isPaused ? "PLAY" : "PAUSE";
                if (isPaused) stopMusicLoop();
                else startMusicLoop();
            }
        }

        function toggleFullscreen() {
            const doc = window.document;
            const docEl = doc.documentElement;
            const requestFullScreen = docEl.requestFullscreen || docEl.mozRequestFullScreen || docEl.webkitRequestFullScreen || docEl.msRequestFullscreen;
            const cancelFullScreen = doc.exitFullscreen || doc.mozCancelFullScreen || doc.webkitExitFullscreen || doc.msExitFullscreen;

            if (!doc.fullscreenElement && !doc.mozFullScreenElement && !doc.webkitFullscreenElement && !doc.msFullscreenElement) {
                requestFullScreen.call(docEl);
            } else {
                cancelFullScreen.call(doc);
            }
        }

        document.getElementById('btn-left').addEventListener('pointerdown', (e) => { e.preventDefault(); initAudio(); movePiece(-1); });
        document.getElementById('btn-right').addEventListener('pointerdown', (e) => { e.preventDefault(); initAudio(); movePiece(1); });
        document.getElementById('btn-down').addEventListener('pointerdown', (e) => { e.preventDefault(); initAudio(); dropPiece(); });
        document.getElementById('btn-rotate').addEventListener('pointerdown', (e) => { e.preventDefault(); initAudio(); rotatePiece(); });
        document.getElementById('btn-drop').addEventListener('pointerdown', (e) => { e.preventDefault(); initAudio(); hardDropPiece(); });
        document.getElementById('btn-pause').addEventListener('pointerdown', (e) => { e.preventDefault(); handleControlFlow(); });
        document.getElementById('btn-reset').addEventListener('pointerdown', (e) => { e.preventDefault(); triggerGameOver("MENU INICIAL"); });
        document.getElementById('btn-fullscreen').addEventListener('pointerdown', (e) => { e.preventDefault(); toggleFullscreen(); });

        window.addEventListener('keydown', e => {
            initAudio();
            if (gameOver || isPaused || isAnimatingClear) return;
            if (e.key === 'ArrowLeft') movePiece(-1);
            if (e.key === 'ArrowRight') movePiece(1);
            if (e.key === 'ArrowDown') dropPiece();
            if (e.key === 'ArrowUp' || e.key.toLowerCase() === 'x') rotatePiece();
            if (e.key === ' ' || e.key.toLowerCase() === 'space') hardDropPiece();
        });

        function update(time = 0) {
            const deltaTime = time - lastTime;
            lastTime = time;

            if (!gameOver && !isPaused && !isAnimatingClear) {
                dropCounter += deltaTime;
                if (dropCounter > dropInterval) {
                    dropPiece();
                    dropCounter = 0;
                }
            }
            renderer.render(scene, camera);
            requestAnimationFrame(update);
        }

        function resizeGameStructure() {
            const displayHeight = window.innerHeight;
            document.body.style.height = displayHeight + 'px';

            const w = container.clientWidth;
            const h = container.clientHeight;
            if(w === 0 || h === 0) return;

            renderer.setSize(w, h);
            
            const expectedAspect = w / h;
            const boundsX = COLS / 2;
            const boundsY = ROWS / 2;

            if (expectedAspect < (COLS / ROWS)) {
                camera.left = -boundsX;
                camera.right = boundsX;
                camera.top = boundsX / expectedAspect;
                camera.bottom = -boundsX / expectedAspect;
            } else {
                camera.left = -boundsY * expectedAspect;
                camera.right = boundsY * expectedAspect;
                camera.top = boundsY;
                camera.bottom = -boundsY;
            }
            
            camera.position.set(COLS / 2, -ROWS / 2, 25);
            camera.lookAt(COLS / 2, -ROWS / 2, 0);
            camera.updateProjectionMatrix();

            pRenderer.setSize(pContainer.clientWidth, pContainer.clientHeight);
            pCamera.updateProjectionMatrix();

            drawScene();
            drawPreview();
        }

        window.addEventListener('resize', resizeGameStructure);
        document.addEventListener('fullscreenchange', () => { setTimeout(resizeGameStructure, 150); });

        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(resizeGameStructure, 80);
            setTimeout(resizeGameStructure, 300);
        });
        
        triggerGameOver("MENU INICIAL");
        
        drawScene();
        drawPreview();
        requestAnimationFrame(update);
    </script>
</body>
</html>
